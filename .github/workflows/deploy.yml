name: Deploy to Cloudflare

# Auto-deploy on push to main (like the marketing site's Pages deploy). In CI the
# environment is clean — no local .dev.vars/.env.local injecting an AI-scoped
# CLOUDFLARE_API_TOKEN — so wrangler uses the deploy-scoped token from secrets
# directly. No token-stripping needed (that was the local-only friction).
#
# Required GitHub repo secrets:
#   CLOUDFLARE_API_TOKEN          deploy-scoped ("Edit Cloudflare Workers" template)
#   CLOUDFLARE_ACCOUNT_ID         430f00d6622c766342f89a4e6a2261f6
#   NEXT_PUBLIC_SUPABASE_URL      baked into the client bundle at build
#   NEXT_PUBLIC_SUPABASE_ANON_KEY public-safe anon key
# Runtime worker secrets (SUPABASE_SERVICE_ROLE_KEY, ANTHROPIC_API_KEY, …) are
# already set on the worker via `wrangler secret put` and persist across deploys.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Gate on deploy token (skip cleanly until it's set)
        id: gate
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN not set — skipping deploy. Add it in Settings → Secrets and variables → Actions to enable auto-deploy."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.gate.outputs.ready == 'true'
        run: npm ci
      - name: Build + deploy (OpenNext → Cloudflare Workers)
        if: steps.gate.outputs.ready == 'true'
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
